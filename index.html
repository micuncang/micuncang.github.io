<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>dryrun.cc — Co-Evolution.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030610; /* 深藏青色背景，更有呼吸感 */
            --point-color: rgba(0, 212, 255, 0.4); /* 理性精密的青绿色点云 */
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-tertiary: rgba(148, 163, 184, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Geist Mono', monospace;
            height: 100vh;
            height: 100dvh; /* 移动端动态视口高度适配 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: clamp(30px, 8vw, 60px);
            overflow: hidden; /* 保持整洁 */
        }

        /* --- 核心视觉：The Entropy Clock (熵之钟) --- */
        .entropy-visual {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(80vw, 450px);
            height: min(80vw, 450px);
            perspective: 1200px;
            z-index: 1;
        }

        .mesh {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: mesh-rotate 40s linear infinite; /* 极其缓慢的旋转 */
            opacity: 0.8; /* 默认半透明 */
        }

        /* 生成参数化点云环 (舒缓呼吸与演进) */
        .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            animation: line-breathe 12s ease-in-out infinite; /* 舒缓呼吸感 */
        }

        /* 移动端保留核心 4 环点云，通过伪元素模拟双旋转轴 */
        .ring::before, .ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--point-color);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        /* CSS 变量控制旋转角度和动画延迟，模拟纠缠感 */
        .ring:nth-child(1)::before { transform: rotateY(0deg) scale(1); animation: ring-rotate-1 20s linear infinite; }
        .ring:nth-child(1)::after  { transform: rotateX(0deg) scale(1); animation: ring-rotate-2 25s linear infinite; }

        .ring:nth-child(2)::before { transform: rotateY(22.5deg) scale(0.95); animation: ring-rotate-1 18s linear infinite reverse; }
        .ring:nth-child(2)::after  { transform: rotateX(22.5deg) scale(0.95); animation: ring-rotate-2 22s linear infinite reverse; }

        .ring:nth-child(3)::before { transform: rotateY(45deg) scale(0.9); animation: ring-rotate-1 16s linear infinite; }
        .ring:nth-child(3)::after  { transform: rotateX(45deg) scale(0.9); animation: ring-rotate-2 19s linear infinite; }

        .ring:nth-child(4)::before { transform: rotateY(67.5deg) scale(0.85); animation: ring-rotate-1 14s linear infinite reverse; }
        .ring:nth-child(4)::after  { transform: rotateX(67.5deg) scale(0.85); animation: ring-rotate-2 17s linear infinite reverse; }

        /* --- 文案与排版 (克制、代码化) --- */
        .container {
            position: relative;
            z-index: 10;
        }

        header {
            font-size: 11px;
            tracking: 0.3em;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        main {
            margin-top: clamp(10vh, 15vh, 20vh);
        }

        .hero-title {
            font-size: clamp(36px, 10vw, 72px); /* 响应式极大字体，强调恢弘感 */
            font-weight: 200; /* 极细字体，强调精密感 */
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-slogan {
            font-size: clamp(16px, 4vw, 24px);
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.3;
            max-width: 700px;
        }

        .meta-text {
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-tertiary);
            max-width: 450px;
            line-height: 1.7;
            text-transform: lowercase;
            border-left: 1px solid rgba(71, 85, 105, 0.2);
            padding-left: 20px;
        }

        /* --- 落款与致谢 --- */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .footer-left p {
            margin-bottom: 4px;
        }

        .typing::after {
            content: '_';
            animation: cursor-blink 1.2s step-end infinite;
        }

        .design-credit {
            writing-mode: vertical-rl;
            letter-spacing: 0.2em;
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* --- Animations (全套完美保留并微调) --- */
        
        @keyframes mesh-rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        @keyframes line-breathe {
            0%, 100% { border-color: rgba(71, 85, 105, 0.3); opacity: 0.6; }
            50% { border-color: rgba(71, 85, 105, 0.6); opacity: 1; }
        }

        /* 双旋转轴路径控制 */
        @keyframes ring-rotate-1 {
            0% { transform: rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateY(360deg) rotateZ(360deg); }
        }

        @keyframes ring-rotate-2 {
            0% { transform: rotateX(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateZ(360deg); }
        }

        @keyframes cursor-blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="entropy-visual">
        <div class="mesh">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
    </div>

    <div class="container">
        <header>
            Init: dry run / dimensions
        </header>

        <main>
            <h1 class="hero-title">
                Co-Evolution.
            </h1>
            <p class="hero-slogan">
                Rational intelligence, shaped by thoughts.
                <span style="font-size: 0.8em; color: rgba(148, 163, 184, 0.6); display: block; margin-top: 6px;">
                    理性智能，思想铸就。
                </span>
            </p>
            <div class="meta-text">
                // > "Computers are useless. They can only give you answers." — Picasso<br>
                // > 电脑没啥用，它们只会给答案。（提问才是人的特权）
            </div>
        </main>
    </div>

    <footer>
        <div class="footer-left">
            <p>> Status: Phase One / Evolving [One commit at a time.<span class="typing"></span>]</p>
        </div>
        <div class="design-credit">
            Designed by Gemini
        </div>
    </footer>

</body>
</html>
