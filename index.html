<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>···</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }

body {
  background: #0e0f11;
  font-family: 'JetBrains Mono', 'Menlo', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  cursor: crosshair;
}

.panel {
  position: relative;
  width: min(660px, 86vw);
  aspect-ratio: 660 / 380;
  flex-shrink: 0;
  border-radius: 2px;
  overflow: hidden;
}

#grid-canvas,
#silk-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#silk-canvas { pointer-events: none; }

.panel svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

body.glitch { animation: bg-glitch 0.3s steps(2) forwards; }
@keyframes bg-glitch {
  0%   { background: #0e0f11; }
  33%  { background: #0a1410; }
  66%  { background: #14080a; }
  100% { background: #0e0f11; }
}

.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ff9f0a;
  color: #111113;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 10px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap;
  z-index: 20;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="panel" id="panel">
  <canvas id="grid-canvas"></canvas>
  <canvas id="silk-canvas"></canvas>

  <svg viewBox="0 0 660 380" id="main-svg"
       xmlns="http://www.w3.org/2000/svg"
       style="font-family:'JetBrains Mono',monospace;">

    <text x="330" y="52"
          font-size="34" font-weight="300"
          fill="#e8e4d8" text-anchor="middle" opacity="0.15">"</text>

    <text id="q1" x="330" y="88"
          font-size="12" font-style="italic"
          fill="#c8c4b8" text-anchor="middle" letter-spacing="0.06em"></text>
    <text id="q2" x="330" y="108"
          font-size="12" font-style="italic"
          fill="#c8c4b8" text-anchor="middle" letter-spacing="0.06em"></text>
    <text id="qa" x="330" y="130"
          font-size="9.5" fill="#665f50"
          text-anchor="middle" letter-spacing="0.14em"></text>

    <text x="330" y="194" font-size="15"
          fill="#d4d0c4" text-anchor="middle" letter-spacing="0.04em">
      something is compiling.
    </text>
    <text x="330" y="226" font-size="15"
          fill="#7a766c" text-anchor="middle" letter-spacing="0.04em">
      it has been compiling for a while.
    </text>
    <text id="fine-text" x="330" y="258" font-size="15"
          fill="#3e3b34" text-anchor="middle" letter-spacing="0.04em">
      this is fine.
    </text>

    <circle id="pulse-dot" cx="330" cy="322" r="3.5" fill="#ff9f0a"/>
  </svg>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 1. GRID — sparser step ──
const gridCanvas = document.getElementById('grid-canvas');
function drawGrid() {
  const W   = gridCanvas.offsetWidth  || gridCanvas.parentElement.offsetWidth;
  const H   = gridCanvas.offsetHeight || gridCanvas.parentElement.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  gridCanvas.width  = W * dpr;
  gridCanvas.height = H * dpr;
  const c = gridCanvas.getContext('2d');
  c.scale(dpr, dpr);
  c.fillStyle = '#141518';
  c.fillRect(0, 0, W, H);
  // sparse grid: 68px step (was 34)
  const step = 68;
  c.strokeStyle = '#1e2024';
  c.lineWidth = 0.7;
  for (let x = 0; x <= W; x += step) {
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke();
  }
  for (let y = 0; y <= H; y += step) {
    c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke();
  }
  c.strokeStyle = '#ff9f0a';
  c.lineWidth = 0.6;
  c.globalAlpha = 0.18;
  c.strokeRect(0.5, 0.5, W - 1, H - 1);
  c.globalAlpha = 1;
}
setTimeout(drawGrid, 0);
window.addEventListener('resize', drawGrid);

// ── 2. DOT pulse + color shift ──
const dot = document.getElementById('pulse-dot');
const colorStops = [[255,159,10],[50,210,180],[160,100,255]];
let dotT0 = null;
const DOT_PERIOD = 5000;
function lerpColor(a, b, t) {
  return a.map((v,i) => Math.round(v + (b[i]-v) * t));
}
function animateDot(ts) {
  if (!dotT0) dotT0 = ts;
  const phase   = ((ts - dotT0) % DOT_PERIOD) / DOT_PERIOD;
  const opacity = 0.15 + 0.85 * (0.5 + 0.5 * Math.cos(phase * 2 * Math.PI));
  const seg = colorStops.length;
  const pos = (phase * seg) % seg;
  const idx = Math.floor(pos) % seg;
  const [r,g,b] = lerpColor(colorStops[idx], colorStops[(idx+1)%seg], pos - Math.floor(pos));
  dot.setAttribute('fill', `rgb(${r},${g},${b})`);
  dot.setAttribute('opacity', opacity.toFixed(3));
  requestAnimationFrame(animateDot);
}
requestAnimationFrame(animateDot);

// ── 3. SILK — gentler physics ──
const silkCanvas = document.getElementById('silk-canvas');
const panel      = document.getElementById('panel');
let sW, sH, sCols, sRows, pts;

function initSilk() {
  sW    = panel.offsetWidth;
  sH    = panel.offsetHeight;
  // fewer mesh points → smoother, lighter feel
  sCols = 36;
  sRows = Math.round(sCols * sH / sW);
  const dpr = window.devicePixelRatio || 1;
  silkCanvas.width  = sW * dpr;
  silkCanvas.height = sH * dpr;
  silkCanvas.getContext('2d').scale(dpr, dpr);
  pts = [];
  for (let r = 0; r <= sRows; r++) {
    for (let c = 0; c <= sCols; c++) {
      const ox = (c / sCols) * sW;
      const oy = (r / sRows) * sH;
      pts.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });
    }
  }
}
setTimeout(initSilk, 0);
window.addEventListener('resize', initSilk);

const waves = [];
// much gentler constants
const SPRING  = 0.10;   // softer restore (was 0.20)
const DAMPING = 0.82;   // more damping → settles slower, calmer (was 0.74)
const W_SPEED = 0.014;  // slower wave propagation (was 0.022)
const W_FORCE = 2.2;    // weaker impulse (was 6.5)

function addWave(px, py) {
  const rect = panel.getBoundingClientRect();
  waves.push({ x: px - rect.left, y: py - rect.top, t: 0 });
}

function tickSilk() {
  if (!pts) return;
  const maxD = Math.max(sW, sH);
  waves.forEach(w => {
    w.t += W_SPEED;
    pts.forEach(p => {
      const dx   = p.ox - w.x;
      const dy   = p.oy - w.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const wavefront = w.t * maxD * 0.55;
      const spread    = maxD * 0.10;   // wider envelope → smoother falloff
      const envelope  = Math.exp(-((dist - wavefront)**2) / (2 * spread**2));
      if (envelope > 0.001) {
        const angle = Math.atan2(dy, dx);
        const force = envelope * W_FORCE;
        p.vx += Math.cos(angle) * force * 0.10;
        p.vy += Math.sin(angle) * force * 0.10;
        // gentle transverse shimmer
        p.vy += Math.sin(dist * 0.04 - w.t * 16) * envelope * force * 0.4;
      }
    });
  });
  for (let i = waves.length - 1; i >= 0; i--) {
    if (waves[i].t > 2.4) waves.splice(i, 1);
  }
  pts.forEach(p => {
    const fx = (p.ox - p.x) * SPRING;
    const fy = (p.oy - p.y) * SPRING;
    p.vx = (p.vx + fx) * DAMPING;
    p.vy = (p.vy + fy) * DAMPING;
    p.x += p.vx;
    p.y += p.vy;
  });
}

function drawSilk() {
  if (!pts || !sW) return;
  const ctx = silkCanvas.getContext('2d');
  ctx.clearRect(0, 0, sW, sH);
  // horizontal
  for (let r = 0; r <= sRows; r++) {
    ctx.beginPath();
    for (let c = 0; c <= sCols; c++) {
      const p    = pts[r * (sCols+1) + c];
      const disp = Math.sqrt((p.x-p.ox)**2 + (p.y-p.oy)**2);
      ctx.strokeStyle = `rgba(232,228,216,${Math.min(0.18, 0.01 + disp*0.016).toFixed(3)})`;
      ctx.lineWidth = 0.6;
      c === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  // vertical
  for (let c = 0; c <= sCols; c++) {
    ctx.beginPath();
    for (let r = 0; r <= sRows; r++) {
      const p    = pts[r * (sCols+1) + c];
      const disp = Math.sqrt((p.x-p.ox)**2 + (p.y-p.oy)**2);
      ctx.strokeStyle = `rgba(232,228,216,${Math.min(0.14, 0.01 + disp*0.012).toFixed(3)})`;
      ctx.lineWidth = 0.6;
      r === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
}

function loopSilk() { tickSilk(); drawSilk(); requestAnimationFrame(loopSilk); }
requestAnimationFrame(loopSilk);

panel.addEventListener('click', e => addWave(e.clientX, e.clientY));

// ── 4. QUOTES ──
const quotes = [
  { l1: "Premature optimization",       l2: "is the root of all evil.",        a: "— Donald Knuth"     },
  { l1: "Talk is cheap.",                l2: "Show me the code.",               a: "— Linus Torvalds"   },
  { l1: "Any fool can write code",       l2: "that a computer can understand.", a: "— Martin Fowler"    },
  { l1: "Make it work, make it right,",  l2: "make it fast.",                   a: "— Kent Beck"        },
  { l1: "Simplicity is",                 l2: "the ultimate sophistication.",    a: "— Leonardo da Vinci"},
  { l1: "It works on",                   l2: "my machine.",                     a: "— Every Developer"  },
];
let qi = 0;
function setQuote(i, fade) {
  const q = quotes[i];
  const els = ['q1','q2','qa'].map(id => document.getElementById(id));
  if (fade) {
    els.forEach(el => { el.style.transition='opacity 0.4s'; el.style.opacity=0; });
    setTimeout(() => {
      els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
      els.forEach(el => { el.style.opacity=1; });
    }, 400);
  } else {
    els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
  }
}
qi = Math.floor(Math.random() * quotes.length);
setQuote(qi, false);

document.getElementById('main-svg').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  if ((e.clientY - rect.top) / rect.height < 0.42) {
    qi = (qi+1) % quotes.length;
    setQuote(qi, true);
  }
});

// ── 5. "this is fine." easter egg ──
const fineAlts = ["this is fine.","no, really.","i'm not okay.","help.","... fine."];
let fineCount = 0;
const finEl = document.getElementById('fine-text');
finEl.style.cursor = 'pointer';
finEl.addEventListener('click', function(e) {
  e.stopPropagation();
  this.textContent = fineAlts[++fineCount % fineAlts.length];
});

// ── 6. KONAMI ──
const konami=[38,38,40,40,37,39,37,39,66,65]; let ki=0;
document.addEventListener('keydown', e => {
  ki = (e.keyCode===konami[ki]) ? ki+1 : 0;
  if (ki===konami.length) {
    ki=0;
    document.body.classList.add('glitch');
    setTimeout(()=>document.body.classList.remove('glitch'),300);
    showToast('↑↑↓↓←→←→BA  //  still compiling.');
  }
});
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
