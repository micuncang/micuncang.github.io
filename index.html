<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something is growing here · Built with Claude Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Inter+Tight:ital,wght@0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #090909;
  --bg2:      #0f0f0f;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --t1:       #f0f0f0;
  --t2:       #666;
  --t3:       #333;
  --accent:   #5e6ad2;   /* Linear's signature indigo */
  --IT:       'Inter Tight', 'Inter', sans-serif;
  --I:        'Inter', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: var(--I);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
}

/* ── LINEAR-STYLE gradient orb ── */
.orb {
  position: fixed;
  width: 900px; height: 900px;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  background: conic-gradient(
    from 180deg at 50% 50%,
    #08aeea 0deg,
    #2af598 72deg,
    #b5fffc 120deg,
    #ff5acd 216deg,
    #5e6ad2 288deg,
    #08aeea 360deg
  );
  filter: blur(140px);
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
  animation: orb-drift 20s ease-in-out infinite alternate;
}
@keyframes orb-drift {
  from { transform: translate(-50%, -60%) scale(1); }
  to   { transform: translate(-50%, -58%) scale(1.06); }
}

/* ── page shell ── */
.page {
  position: relative; z-index: 1;
  width: min(860px, 92vw);
  height: min(580px, 92dvh);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* ── top nav strip ── */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 0;
  flex-shrink: 0;
}

.nav-logo {
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-logo svg { width: 12px; height: 12px; }

.nav-status {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--I);
  font-size: 11px;
  font-weight: 400;
  color: var(--t3);
  letter-spacing: 0.01em;
}
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #3d9970;
  animation: ndot 3s ease-in-out infinite;
}
@keyframes ndot {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

/* ── HERO ── */
.hero {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0;
  position: relative;
}

/* subtle grid lines — Linear does this */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 80% at 50% 50%, black 30%, transparent 100%);
  pointer-events: none;
}

.label {
  font-family: var(--I);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--t3);
  text-transform: uppercase;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.label::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--t3);
}

/* headline — Inter Tight, Linear-style sizing */
h1 {
  font-family: var(--IT);
  font-size: clamp(44px, 7.5vw, 88px);
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -0.04em;
  color: var(--t1);
  margin-bottom: 0;
  position: relative; z-index: 1;
}

h1 .italic {
  font-style: italic;
  font-weight: 700;
  /* Linear uses gradient text for impact */
  background: linear-gradient(90deg, #c8c8c8 0%, #666 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

h1 .accent {
  /* indigo accent — Linear's brand color */
  background: linear-gradient(90deg, #8892f8 0%, #5e6ad2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-style: normal;
}

.sub {
  font-family: var(--I);
  font-size: clamp(13px, 1.5vw, 15px);
  font-weight: 300;
  color: var(--t2);
  line-height: 1.65;
  margin-top: 24px;
  max-width: 380px;
  position: relative; z-index: 1;
}

/* ── BOTTOM SECTION ── */
.bottom {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: stretch;
}

/* glass card — core Linear UI element */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--border2); }

.card-main {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.card-copy {
  font-family: var(--I);
  font-size: clamp(12px, 1.5vw, 14px);
  font-weight: 400;
  color: var(--t2);
  line-height: 1.5;
}

.card-copy strong {
  color: var(--t1);
  font-weight: 500;
}

.card-meta {
  font-size: 11px;
  font-weight: 400;
  color: var(--t3);
  text-align: right;
  flex-shrink: 0;
  line-height: 1.6;
}
.card-meta a {
  color: var(--t2);
  text-decoration: none;
  transition: color 0.2s;
  font-size: 11px;
}
.card-meta a:hover { color: var(--t1); }

/* building label card */
.dot-card {
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 110px;
  flex-shrink: 0;
}

.building-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--I);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--t3);
}

/* animated progress bar */
.building-bar {
  display: block;
  width: 40px;
  height: 2px;
  background: var(--t3);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.building-bar::after {
  content: '';
  position: absolute;
  left: -100%;
  top: 0; bottom: 0;
  width: 100%;
  background: linear-gradient(90deg, transparent, #5e6ad2, transparent);
  animation: bar-sweep 2s ease-in-out infinite;
}
@keyframes bar-sweep {
  0%   { left: -100%; }
  100% { left: 100%; }
}

/* ── toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(15,15,15,0.95);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--t2); font-family: var(--I);
  font-size: 11px; font-weight: 400;
  letter-spacing: 0.02em; padding: 9px 18px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap; z-index: 99;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── mobile ── */
@media (max-width: 560px) {
  .page { width: 96vw; height: 96dvh; }
  h1 { font-size: clamp(38px, 12vw, 60px); }
  .sub { font-size: 13px; }
  .bottom { grid-template-columns: 1fr; }
  .dot-card { padding: 12px 0; border-radius: 10px; }
  .card-main { flex-direction: column; align-items: flex-start; gap: 10px; }
  .card-meta { text-align: left; }
}
</style>
</head>
<body>

<div class="orb"></div>

<div class="page">



  <!-- hero -->
  <div class="hero">
    <div class="label">coming soon</div>
    <h1>
      Something<br>
      <span class="italic">is growing</span><br>
      <span class="accent">here.</span>
    </h1>
    <p class="sub">
      Ideas, writing, and things worth making.<br>
      The best is still being compiled.
    </p>
  </div>

  <!-- bottom -->
  <div class="bottom">
    <div class="card">
      <div class="card-main">
        <div class="card-copy">
          <strong>Stay tuned.</strong> — A space taking shape, one commit at a time.
        </div>
        <div class="card-meta">
          Built with<br>
          <a href="https://claude.ai/code" target="_blank">Claude Code ↗</a>
        </div>
      </div>
    </div>
    <div class="card dot-card">
      <div class="building-label">
        <span class="building-bar"></span>
        building
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// subtle click ripple
document.addEventListener('click', e => {
  const r = document.createElement('div');
  Object.assign(r.style, {
    position: 'fixed',
    borderRadius: '50%',
    pointerEvents: 'none',
    border: '1px solid rgba(94,106,210,0.25)',
    width: '8px', height: '8px',
    left: e.clientX + 'px', top: e.clientY + 'px',
    transform: 'translate(-50%,-50%) scale(0)',
    animation: 'rout .55s cubic-bezier(.2,.8,.3,1) forwards',
    zIndex: 50
  });
  if (!document.getElementById('rout-style')) {
    const s = document.createElement('style');
    s.id = 'rout-style';
    s.textContent = '@keyframes rout{to{transform:translate(-50%,-50%) scale(1);opacity:0;width:70px;height:70px}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 580);
});

// konami
const km = [38,38,40,40,37,39,37,39,66,65]; let ki = 0;
document.addEventListener('keydown', e => {
  ki = e.keyCode === km[ki] ? ki+1 : 0;
  if (ki === km.length) {
    ki = 0;
    const t = document.getElementById('toast');
    t.textContent = '// still compiling — expected behavior.';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
});
</script>
</body>
</html>
