<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dryrun.cc — Co-Evolution</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..400&display=swap" rel="stylesheet">
    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    <script src="https://cdn.staticfile.org/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root { --bg: #010309; --cyan: #00f2fe; --dim: rgba(148, 163, 184, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            background: var(--bg); color: #fff; font-family: 'Geist Mono', monospace; 
            width: 100%; height: 100%; overflow: hidden; position: fixed; 
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-overlay { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            width: 100%; height: 100%; 
            padding: clamp(30px, 6vw, 80px); 
            display: flex; flex-direction: column;
            pointer-events: none; 
        }

        header { 
            font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase;
            display: flex; align-items: center; margin-bottom: 2vh;
        }
        .header-line { width: 30px; height: 1px; background: var(--cyan); opacity: 0.6; margin-right: 12px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        
        .hero-zone { margin-bottom: 40px; }
        .hero-title { 
            font-size: clamp(38px, 9vw, 90px); font-weight: 200; 
            letter-spacing: -2px; line-height: 1; margin-bottom: 12px;
        }
        .hero-slogan { font-size: 14px; color: #94a3b8; font-weight: 300; letter-spacing: 0.5px; }

        .info-zone { margin-top: auto; padding-bottom: 20px; }
        .quote { 
            font-size: 11px; color: #64748b; line-height: 1.8; 
            max-width: 280px; margin-bottom: 15px; 
            border-left: 2px solid var(--cyan); padding-left: 15px; 
        }
        .dynamic-meta { font-size: 10px; color: var(--cyan); opacity: 0.8; font-weight: 500; }

        footer { 
            display: flex; flex-direction: column; gap: 8px;
            font-size: 9px; color: #475569; letter-spacing: 1px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .tech-support { opacity: 0.5; }

        @media (min-width: 769px) {
            main { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .info-zone { text-align: right; margin-top: 30vh; }
            .quote { border-left: none; border-right: 2px solid var(--cyan); padding-left: 0; padding-right: 15px; margin-left: auto; }
            footer { flex-direction: row; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header><div class="header-line"></div>THOUGHT IS THE FIRST STEP; DATA IS THE LONG ECHO.</header>
        <main>
            <div class="hero-zone">
                <h1 class="hero-title">Co-Evolution.</h1>
                <p class="hero-slogan">Rational intelligence, shaped by thoughts.</p>
            </div>
            <div class="info-zone">
                <p class="quote">// > "Computers are useless. They can only give you answers."</p>
                <div class="dynamic-meta" id="bj-time">BEIJING: SYNCING...</div>
            </div>
        </main>
        <footer>
            <div>> STATUS: ITERATING...</div>
            <div class="tech-support">TECHNOLOGY SPONSORED BY GEMINI</div>
        </footer>
    </div>

    <script>
        function updateTime() {
            const el = document.getElementById('bj-time');
            const now = new Date();
            const bj = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
            if(el) el.innerText = `BEIJING: ${bj.toISOString().replace('T', ' ').substring(0, 19)}`;
        }
        setInterval(updateTime, 1000);

        let scene, camera, renderer, particles, lines, group;
        const isMobile = window.innerWidth < 768;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x010309, 2, 12);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = isMobile ? 8.5 : 5.5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // 解决 Retina 屏模糊，增强矢量感
            const pr = window.devicePixelRatio || 1;
            renderer.setPixelRatio(Math.min(pr, 3)); 
            
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            const pCount = isMobile ? 2500 : 5000;
            const pGeom = new THREE.BufferGeometry();
            const posArr = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                const r = 3.2 * Math.pow(Math.random(), 0.5); 
                const t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1);
                posArr[i*3] = r * Math.sin(p) * Math.cos(t);
                posArr[i*3+1] = r * Math.sin(p) * Math.sin(t);
                posArr[i*3+2] = r * Math.cos(p);
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            particles = new THREE.Points(pGeom, new THREE.PointsMaterial({ 
                color: 0x00f2fe, size: isMobile ? 0.007 : 0.01, transparent: true, opacity: 0.5 
            }));
            group.add(particles);

            const lCount = isMobile ? 400 : 800;
            const lGeom = new THREE.BufferGeometry();
            lines = new THREE.LineSegments(lGeom, new THREE.LineBasicMaterial({ 
                color: 0x00f2fe, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending 
            }));
            lGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(lCount * 6), 3));
            group.add(lines);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.00012; 
            group.rotation.y += 0.0006;
            
            const pP = particles.geometry.attributes.position.array;
            const lP = lines.geometry.attributes.position.array;
            const pL = pP.length / 3;
            
            for (let i = 0; i < lP.length / 6; i++) {
                const idx1 = Math.floor((i * 13 + Math.sin(time + i * 0.05) * 150) % pL);
                const idx2 = (idx1 + 180) % pL;
                for(let j=0; j<3; j++) {
                    lP[i*6+j] = pP[idx1*3+j];
                    lP[i*6+3+j] = pP[idx2*3+j];
                }
            }
            lines.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('mousemove', (e) => {
            if(group) {
                const x = (e.clientX / window.innerWidth - 0.5) * 0.5;
                const y = (e.clientY / window.innerHeight - 0.5) * 0.5;
                gsap.to(group.rotation, { x: y, y: x, duration: 3 });
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
