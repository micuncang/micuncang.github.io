<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dryrun.cc — Co-Evolution</title>
    
    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --bg: #010309; --cyan: #00f2fe; --dim: rgba(148, 163, 184, 0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        /* 核心修复 1：在 Chrome 下使用 Fixed 物理百分比代替不稳固的 VH */
        body, html { 
            background: var(--bg); color: #fff; 
            font-family: "SF Mono", "Monaco", "Consolas", monospace; 
            width: 100%; height: 100%; overflow: hidden; position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
        }

        #canvas-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; background: var(--bg);
        }

        .ui-overlay { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            width: 100%; height: 100%; 
            padding: clamp(30px, 6vw, 80px); 
            display: flex; flex-direction: column;
            pointer-events: none; 
        }

        header { 
            font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase;
            display: flex; align-items: center; margin-bottom: 2vh;
        }
        .header-line { width: 30px; height: 1px; background: var(--cyan); opacity: 0.5; margin-right: 12px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .hero-title { 
            font-size: clamp(38px, 8vw, 90px); font-weight: 200; 
            letter-spacing: -2px; line-height: 1.1; margin-bottom: 12px;
        }
        .hero-slogan { font-size: 14px; color: #94a3b8; font-weight: 300; letter-spacing: 0.5px; }

        .info-zone { margin-top: auto; padding-bottom: 20px; }
        .dynamic-meta { font-size: 10px; color: var(--cyan); opacity: 0.8; font-weight: 500; }

        footer { 
            display: flex; flex-direction: column; gap: 8px;
            font-size: 9px; color: #475569; letter-spacing: 1px;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        @media (min-width: 769px) {
            main { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .info-zone { text-align: right; margin-top: 30vh; }
            footer { flex-direction: row; justify-content: space-between; align-items: flex-end; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header><div class="header-line"></div>THOUGHT IS THE FIRST STEP; DATA IS THE LONG ECHO.</header>
        <main>
            <div class="hero-zone">
                <h1 class="hero-title">Co-Evolution.</h1>
                <p class="hero-slogan">Rational intelligence, shaped by thoughts.</p>
            </div>
            <div class="info-zone">
                <div class="dynamic-meta" id="bj-time">BEIJING: SYNCING...</div>
            </div>
        </main>
        <footer>
            <div>THE FUTURE IS UNFOLDING BEYOND THE HORIZON.</div>
            <div style="color: var(--cyan); opacity: 0.4; letter-spacing: 2px; font-size: 8px;">POWERED BY GEMINI</div>
        </footer>
    </div>

    <script>
        let scene, camera, renderer, group;
        let targetX = 0, targetY = 0, curX = 0, curY = 0;
        const isMobile = window.innerWidth < 768;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010309);
            scene.fog = new THREE.Fog(0x010309, 12, 45); 
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            const ratio = w / h;
            
            camera = new THREE.PerspectiveCamera(35, ratio, 2.0, 1000); 
            // 核心修复 2：移动端相机的物理位置补偿
            camera.position.z = (w < 768) ? (ratio < 1 ? 16 : 14) : 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false }); 
            renderer.setPixelRatio(1.0); 
            renderer.setSize(w, h);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            const pCount = isMobile ? 4000 : 10000;
            const pGeom = new THREE.BufferGeometry();
            const posArr = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                const r = 16.5 * Math.pow(Math.random(), 0.8);
                const t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1);
                posArr[i*3] = r * Math.sin(p) * Math.cos(t);
                posArr[i*3+1] = r * Math.sin(p) * Math.sin(t);
                posArr[i*3+2] = r * Math.cos(p);
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            const pMat = new THREE.PointsMaterial({ 
                color: 0x00a6fb, size: 0.008, transparent: true, opacity: 0.5, depthWrite: false 
            });
            group.add(new THREE.Points(pGeom, pMat));

            const lCount = isMobile ? 800 : 2200;
            const lGeom = new THREE.BufferGeometry();
            const lPosArr = new Float32Array(lCount * 6);
            for (let i = 0; i < lCount; i++) {
                const idx1 = Math.floor((i * 13) % pCount);
                const idx2 = (idx1 + 45) % pCount;
                for(let j=0; j<3; j++) {
                    lPosArr[i*6+j] = posArr[idx1*3+j];
                    lPosArr[i*6+3+j] = posArr[idx2*3+j];
                }
            }
            lGeom.setAttribute('position', new THREE.BufferAttribute(lPosArr, 3));
            const lMat = new THREE.LineBasicMaterial({ 
                color: 0x00a6fb, transparent: true, opacity: 0.15, depthWrite: false 
            });
            group.add(new THREE.LineSegments(lGeom, lMat));

            window.addEventListener('mousemove', e => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 0.45;
                targetY = (e.clientY / window.innerHeight - 0.5) * 0.35;
            }, { passive: true });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.000025;
            curX += (targetX - curX) * 0.04;
            curY += (targetY - curY) * 0.04;
            group.rotation.y = time * 5 + curX;
            group.rotation.x = time * 2 + curY;
            renderer.render(scene, camera);
        }

        // 核心修复 3：在 Chrome 横竖屏切换时拦截非正数尺寸，并锁定相机中心
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (w <= 0 || h <= 0) return; 
            
            const ratio = w / h;
            camera.aspect = ratio;
            // Chrome 物理位置重对齐
            camera.position.z = (w < 768) ? (ratio < 1 ? 16 : 14) : 12;
            camera.updateProjectionMatrix();
            camera.lookAt(0,0,0);
            
            renderer.setSize(w, h);
        }, { passive: true });

        setInterval(() => {
            const el = document.getElementById('bj-time');
            const bj = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (8 * 3600000));
            if(el) el.innerText = `BEIJING: ${bj.toISOString().replace('T', '_').substring(0, 19)}`;
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
