<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='20' cy='50' r='6' fill='%23334155' opacity='0.4'/><circle cx='20' cy='30' r='4' fill='%23334155' opacity='0.3'/><rect x='40' y='35' width='20' height='30' fill='%23475569' opacity='0.6'/><rect x='70' y='25' width='25' height='50' fill='%2364748b'/></svg>">
    
    <title>Co-Evolution</title>

    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #07111f; --cyan: #36f6ff; --dim: rgba(191, 211, 230, 0.42); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            background: var(--bg); color: #fff; 
            font-family: "JetBrains Mono", "SF Mono", "Monaco", monospace; 
            width: 100vw; height: 100vh; height: -webkit-fill-available;
            overflow: hidden; position: fixed; top: 0; left: 0;
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: var(--bg); touch-action: none; }
        #canvas-container canvas { display: block; width: 100% !important; height: 100% !important; opacity: 0.78; }

        .ui-overlay { 
            position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; height: 100dvh;
            padding: clamp(30px, 6vw, 80px); display: flex; flex-direction: column; pointer-events: none;
            background:
                radial-gradient(circle at 18% 22%, rgba(12, 24, 42, 0.54), transparent 32%),
                linear-gradient(90deg, rgba(5, 11, 22, 0.72) 0%, rgba(5, 11, 22, 0.42) 38%, rgba(5, 11, 22, 0.16) 100%);
        }

        header { font-size: 10px; letter-spacing: 2px; color: rgba(215, 229, 242, 0.72); text-transform: uppercase; display: flex; align-items: center; margin-bottom: 2vh; text-shadow: 0 0 12px rgba(0, 0, 0, 0.28); }
        .header-line { width: 30px; height: 1px; background: var(--cyan); opacity: 0.5; margin-right: 12px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .hero-zone { max-width: min(680px, 88vw); }
        .hero-title {
            font-size: clamp(38px, 8vw, 90px);
            font-weight: 220;
            letter-spacing: -1.6px;
            line-height: 1.08;
            margin-bottom: 14px;
            color: #f8fbff;
            text-shadow: 0 0 24px rgba(0, 0, 0, 0.28);
        }
        .hero-slogan {
            font-size: 14px;
            color: #d2dde9;
            font-weight: 400;
            letter-spacing: 0.35px;
            line-height: 1.7;
            text-shadow: 0 0 16px rgba(0, 0, 0, 0.24);
        }

        .info-zone { margin-top: auto; padding-bottom: 20px; }
        .dynamic-meta { font-size: 10px; color: #7ef8ff; opacity: 0.96; font-weight: 600; font-family: monospace; text-shadow: 0 0 14px rgba(54, 246, 255, 0.18); }

        footer { display: flex; flex-direction: column; gap: 8px; font-size: 9px; color: #93a6bc; letter-spacing: 1px; padding-bottom: env(safe-area-inset-bottom, 20px); text-shadow: 0 0 12px rgba(0, 0, 0, 0.24); }

        @media (min-width: 769px) {
            main { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .info-zone { text-align: right; margin-top: 30vh; }
            footer { flex-direction: row; justify-content: space-between; align-items: flex-end; }
        }

        @media (max-width: 768px) {
            .ui-overlay {
                background:
                    radial-gradient(circle at 20% 18%, rgba(12, 24, 42, 0.48), transparent 34%),
                    linear-gradient(180deg, rgba(5, 11, 22, 0.72) 0%, rgba(5, 11, 22, 0.34) 42%, rgba(5, 11, 22, 0.2) 100%);
            }
            .hero-zone { max-width: 100%; }
            .hero-title { letter-spacing: -1.2px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header><div class="header-line"></div>THOUGHT IS THE FIRST STEP; DATA IS THE LONG ECHO.</header>
        <main>
            <div class="hero-zone">
                <h1 class="hero-title">Co-Evolution.</h1>
                <p class="hero-slogan">Rational intelligence, shaped by thoughts.</p>
            </div>
            <div class="info-zone">
                <div class="dynamic-meta" id="bj-time">BEIJING: SYNCING...</div>
            </div>
        </main>
        <footer>
            <div>THE FUTURE IS UNFOLDING BEYOND THE HORIZON.</div>
            <div style="color: var(--cyan); opacity: 0.4; letter-spacing: 2px; font-size: 8px;">POWERED BY GEMINI</div>
        </footer>
    </div>
    <script>
        let scene, camera, renderer, group;
        let targetX = 0, targetY = 0, curX = 0, curY = 0;
        const isMobile = window.innerWidth < 768;

        function handleResize() {
            const w = window.innerWidth, h = window.innerHeight;
            if (w <= 0 || h <= 0) return; 
            const ratio = w / h;
            camera.aspect = ratio;
            camera.position.z = (w < 768) ? (ratio < 1 ? 16 : 14) : 12;
            camera.updateProjectionMatrix();
            camera.lookAt(0,0,0);
            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x07111f);
            scene.fog = new THREE.Fog(0x07111f, 13, 48); 
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 2.0, 1000); 
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false }); 
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            handleResize();
            
            group = new THREE.Group();
            scene.add(group);
            
            const pCount = isMobile ? 4000 : 10000;
            const pGeom = new THREE.BufferGeometry();
            const posArr = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                const r = 16.5 * Math.pow(Math.random(), 0.8);
                const t = Math.random() * Math.PI * 2, p = Math.acos((Math.random() * 2) - 1);
                posArr[i*3] = r * Math.sin(p) * Math.cos(t);
                posArr[i*3+1] = r * Math.sin(p) * Math.sin(t);
                posArr[i*3+2] = r * Math.cos(p);
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            group.add(new THREE.Points(pGeom, new THREE.PointsMaterial({ color: 0x36f6ff, size: 0.009, transparent: true, opacity: 0.58, depthWrite: false })));
            
            const lCount = isMobile ? 800 : 2200;
            const lGeom = new THREE.BufferGeometry();
            const lPosArr = new Float32Array(lCount * 6);
            for (let i = 0; i < lCount; i++) {
                const idx1 = Math.floor((i * 13) % pCount);
                const idx2 = (idx1 + 45) % pCount;
                for(let j=0; j<3; j++) { lPosArr[i*6+j] = posArr[idx1*3+j]; lPosArr[i*6+3+j] = posArr[idx2*3+j]; }
            }
            lGeom.setAttribute('position', new THREE.BufferAttribute(lPosArr, 3));
            
            // 3. 强调连线网格：提升不透明度以展现架构感
            group.add(new THREE.LineSegments(lGeom, new THREE.LineBasicMaterial({ 
                color: 0x36f6ff, 
                transparent: true, 
                opacity: 0.3, 
                depthWrite: false 
            })));

            window.addEventListener('mousemove', e => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 0.45;
                targetY = (e.clientY / window.innerHeight - 0.5) * 0.35;
            }, { passive: true });
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.00002;
            curX += (targetX - curX) * 0.04;
            curY += (targetY - curY) * 0.04;
            group.rotation.y = time * 4.5 + curX;
            group.rotation.x = time * 1.8 + curY;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            handleResize();
            setTimeout(handleResize, 100);
        }, { passive: true });

        // BEIJING 时间精准同步
        setInterval(() => {
            const el = document.getElementById('bj-time');
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bjTime = new Date(utc + (3600000 * 8));
            if(el) {
                const f = (n) => String(n).padStart(2, '0');
                el.innerText = `BEIJING: ${bjTime.getFullYear()}-${f(bjTime.getMonth()+1)}-${f(bjTime.getDate())}_${f(bjTime.getHours())}:${f(bjTime.getMinutes())}:${f(bjTime.getSeconds())}`;
            }
        }, 1000);

        window.onload = init;
    </script>
</body>
</html>
