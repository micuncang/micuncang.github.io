<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dryrun.cc — Co-Evolution</title>
    
    <style>
        :root { --bg: #010309; --cyan: #00f2fe; --dim: rgba(148, 163, 184, 0.3); }
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }
        
        body, html { 
            background: var(--bg); color: #fff; 
            font-family: "SF Mono", "Monaco", "Consolas", "Liberation Mono", "Courier New", monospace; 
            width: 100%; height: 100%; overflow: hidden; position: fixed; 
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ui-overlay { 
            position: absolute; top: 0; left: 0; z-index: 10; 
            width: 100%; height: 100%; 
            padding: clamp(24px, 6vw, 80px); 
            display: flex; flex-direction: column;
            pointer-events: none; 
        }

        header { 
            font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase;
            display: flex; align-items: center; margin-bottom: 2vh;
        }
        .header-line { width: 30px; height: 1px; background: var(--cyan); opacity: 0.4; margin-right: 12px; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        
        .hero-zone { margin-bottom: 30px; }
        .hero-title { 
            font-size: clamp(32px, 8vw, 85px); font-weight: 200; 
            letter-spacing: -2px; line-height: 1; margin-bottom: 8px;
            white-space: nowrap; 
        }
        .hero-slogan { font-size: 13px; color: #94a3b8; font-weight: 300; letter-spacing: 0.5px; opacity: 0.8; }

        .info-zone { margin-top: auto; padding-bottom: 15px; }
        .quote { 
            font-size: 10px; color: #64748b; line-height: 1.6; 
            max-width: 280px; margin-bottom: 12px; 
            border-left: 2px solid var(--cyan); padding-left: 15px; 
        }
        .dynamic-meta { font-size: 10px; color: var(--cyan); opacity: 0.7; font-weight: 500; }

        footer { 
            display: flex; flex-direction: column; gap: 6px;
            font-size: 9px; color: #475569; letter-spacing: 1px;
            padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        .tech-support { opacity: 0.4; font-size: 8px; }

        @media (min-width: 769px) {
            main { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .info-zone { text-align: right; margin-top: 30vh; }
            .quote { border-left: none; border-right: 2px solid var(--cyan); padding-left: 0; padding-right: 15px; margin-left: auto; }
            footer { flex-direction: row; justify-content: space-between; }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .ui-overlay { padding: 20px 40px; }
            .hero-title { font-size: clamp(26px, 6vh, 38px); }
            .quote { display: none; }
        }
    </style>
    
    <script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
    <script src="https://cdn.staticfile.org/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header><div class="header-line"></div>THOUGHT IS THE FIRST STEP; DATA IS THE LONG ECHO.</header>
        <main>
            <div class="hero-zone">
                <h1 class="hero-title">Co-Evolution.</h1>
                <p class="hero-slogan">Rational intelligence, shaped by thoughts.</p>
            </div>
            <div class="info-zone">
                <p class="quote">// > "Computers are useless. They can only give you answers."</p>
                <div class="dynamic-meta" id="bj-time">BEIJING: SYNCING...</div>
            </div>
        </main>
        <footer>
            <div>> STATUS: OPTIMIZING_VECTOR_TOPOLOGY...</div>
            <div class="tech-support">TECHNOLOGY SPONSORED BY GEMINI</div>
        </footer>
    </div>

    <script>
        function updateTime() {
            const el = document.getElementById('bj-time');
            const bj = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (8 * 3600000));
            if(el) el.innerText = `BEIJING: ${bj.toISOString().replace('T', '_').substring(0, 19)}`;
        }
        setInterval(updateTime, 1000);

        let scene, camera, renderer, particles, lines, group;
        
        function getCameraSettings() {
            const isMobile = window.innerWidth < 768;
            const isLandscape = window.innerWidth > window.innerHeight;
            // 收窄视角 (FOV) 以增强透视立体感
            if (isMobile && isLandscape) return { z: 4.5, fov: 32 };
            if (isMobile) return { z: 12.0, fov: 38 };
            return { z: 9.0, fov: 35 };
        }

        function init() {
            scene = new THREE.Scene();
            // 雾化范围拉远，增加深邃感
            scene.fog = new THREE.Fog(0x010309, 2, 25);
            
            const config = getCameraSettings();
            camera = new THREE.PerspectiveCamera(config.fov, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = config.z;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            // 神经网络晶格重塑：扩大分布半径以体现恢弘感
            const isMobile = window.innerWidth < 768;
            const pCount = isMobile ? 2500 : 6000;
            const pGeom = new THREE.BufferGeometry();
            const posArr = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                // radius 扩大 200%，体现恢弘感
                const r = 12.0 * Math.pow(Math.random(), 0.7); 
                const t = Math.random() * Math.PI * 2;
                const p = Math.acos((Math.random() * 2) - 1);
                posArr[i*3] = r * Math.sin(p) * Math.cos(t);
                posArr[i*3+1] = r * Math.sin(p) * Math.sin(t);
                posArr[i*3+2] = r * Math.cos(p);
            }
            pGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            particles = new THREE.Points(pGeom, new THREE.PointsMaterial({ 
                color: 0x00f2fe, 
                size: isMobile ? 0.005 : 0.006, // 针尖大小
                transparent: true, 
                opacity: 0.45 
            }));
            group.add(particles);

            // 连线：采用群格拓扑算法体现神经网络
            const lCount = isMobile ? 600 : 1200;
            const lGeom = new THREE.BufferGeometry();
            const lPosArr = new Float32Array(lCount * 6);
            lGeom.setAttribute('position', new THREE.BufferAttribute(lPosArr, 3));
            
            lines = new THREE.LineSegments(lGeom, new THREE.LineBasicMaterial({ 
                color: 0x00f2fe, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending 
            }));
            group.add(lines);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // 极致缓和的时间系数
            const time = Date.now() * 0.00003; 
            // 极慢且带有纵深感的立体旋转
            group.rotation.y += 0.0002;
            group.rotation.x += 0.00008;
            group.rotation.z += 0.00004; 
            
            const pP = particles.geometry.attributes.position.array;
            const lP = lines.geometry.attributes.position.array;
            const pL = pP.length / 3;
            const lL = lP.length / 6;
            
            // 拓扑修复：确定性网络流转
            for (let i = 0; i < lL; i++) {
                // 神经网络确定性连接：通过基于时间的确定性偏移量产生连线滑动
                // 连线选取邏輯更开阔且具确定性，不再是 Math.floor 跳变，视觉上是滑动的
                const timeShift = Math.sin(time + i * 0.05) * 50;
                
                const idx1 = Math.floor((i * 13 + timeShift) % pL); 
                const idx2 = (idx1 + 180) % pL; // 建立具跨距的确定性连接
                
                // 确保索引不越界
                const safeIdx1 = Math.max(0, idx1);
                const safeIdx2 = Math.max(0, idx2);

                for(let j=0; j<3; j++) {
                    lP[i*6+j] = pP[safeIdx1*3+j];
                    lP[i*6+3+j] = pP[safeIdx2*3+j];
                }
            }
            lines.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        const handleMove = (x, y) => {
            if (!group || typeof gsap === 'undefined') return;
            const nx = (x / window.innerWidth - 0.5) * 2;
            const ny = (y / window.innerHeight - 0.5) * 2;
            gsap.to(group.rotation, { x: ny * 0.8, y: nx * 1.2, duration: 3.5, ease: "sine.out" });
        };

        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

        window.addEventListener('resize', () => {
            const config = getCameraSettings();
            camera.fov = config.fov;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.z = config.z;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
