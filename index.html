<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dryrun.cc — Co-Evolution</title>
    
    <link href="https://fonts.loli.net/css2?family=Geist+Mono:wght@100..400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    
    <style>
        :root { --bg: #010309; --cyan: #00f2fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Geist Mono', monospace; 
            overflow: hidden; 
            width: 100%;
            height: 100%;
            position: fixed; 
        }

        #canvas-container { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 1; 
            background: transparent;
        }

        .ui-overlay { 
            position: absolute; 
            top: 0; left: 0;
            z-index: 10; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            justify-content: space-between; 
            padding: clamp(30px, 7vw, 60px); 
            pointer-events: none; 
        }

        header { 
            font-size: 11px; 
            letter-spacing: 2px; 
            color: rgba(148, 163, 184, 0.4); 
            text-transform: uppercase;
        }

        .hero-title { font-size: clamp(32px, 8vw, 72px); font-weight: 200; letter-spacing: -1px; margin-top: 20px; }
        .hero-slogan { font-size: 14px; color: #94a3b8; font-weight: 300; margin-top: 8px; line-height: 1.4; }
        
        .meta-text-block { 
            margin-top: 30px; 
            padding-left: 15px; 
            border-left: 1px solid rgba(0, 242, 254, 0.3); 
            max-width: 85%; 
            pointer-events: auto; 
        }
        .quote { font-size: 12px; color: #64748b; line-height: 1.5; }
        .dynamic-meta { font-size: 9px; color: rgba(0, 242, 254, 0.3); margin-top: 10px; }

        footer { font-size: 10px; color: #64748b; padding-bottom: 20px; }
        .typing::after { content: '_'; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header>Thought is the first step; data is the long echo.</header>
        
        <main>
            <h1 class="hero-title">Co-Evolution.</h1>
            <p class="hero-slogan">Rational intelligence, shaped by thoughts.</p>
            <div class="meta-text-block">
                <p class="quote">// > "Computers are useless. They can only give you answers."</p>
                <div class="dynamic-meta" id="bj-time">>> BEIJING: SYNCING...</div>
            </div>
        </main>
        
        <footer>
            <div>> Status: Synchronizing...<span class="typing"></span></div>
        </footer>
    </div>

    <script>
        function updateTime() {
            const el = document.getElementById('bj-time');
            const now = new Date();
            const bj = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
            el.innerText = `>> BEIJING: ${bj.toISOString().replace('T', '_').substring(0, 19)}`;
        }
        setInterval(updateTime, 1000);

        let scene, camera, renderer, particles, lines, group;
        let isMobile = window.innerWidth < 768;

        function init() {
            if (typeof THREE === 'undefined') return; // 防止资源加载失败报错

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x010309, 1, 12);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = isMobile ? 6 : 5;

            renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true, precision: 'mediump' });
            handleResize();
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            group = new THREE.Group();
            scene.add(group);

            const particleCount = isMobile ? 1200 : 2500;
            const pGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                const r = 3 * Math.sqrt(Math.random());
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles = new THREE.Points(pGeometry, new THREE.PointsMaterial({
                color: 0x00f2fe, size: 0.015, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending
            }));
            group.add(particles);

            const lineCount = isMobile ? 200 : 450; 
            const lGeometry = new THREE.BufferGeometry();
            const lPositions = new Float32Array(lineCount * 6);
            lGeometry.setAttribute('position', new THREE.BufferAttribute(lPositions, 3));
            lines = new THREE.LineSegments(lGeometry, new THREE.LineBasicMaterial({
                color: 0x00f2fe, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending
            }));
            group.add(lines);

            animate();
        }

        function handleResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            if (camera) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
            if (renderer) {
                renderer.setSize(w, h);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            }
        }

        window.addEventListener('resize', () => {
            handleResize();
            setTimeout(handleResize, 200); 
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0005;
            group.rotation.y = time * 0.12;
            group.rotation.z = Math.sin(time * 0.3) * 0.1;
            
            const pPos = particles.geometry.attributes.position.array;
            const lPos = lines.geometry.attributes.position.array;
            
            for (let i = 0; i < (lPos.length / 6); i++) {
                const idx1 = (i * 7) % (pPos.length / 3);
                const idx2 = (idx1 + Math.floor(Math.sin(time + i) * 80) + 150) % (pPos.length / 3);
                lPos[i*6] = pPos[idx1*3];
                lPos[i*6+1] = pPos[idx1*3+1];
                lPos[i*6+2] = pPos[idx1*3+2];
                lPos[i*6+3] = pPos[idx2*3];
                lPos[i*6+4] = pPos[idx2*3+1];
                lPos[i*6+5] = pPos[idx2*3+2];
            }
            lines.geometry.attributes.position.needsUpdate = true;
            lines.material.opacity = 0.1 + Math.abs(Math.sin(time * 4)) * 0.2;
            renderer.render(scene, camera);
        }

        // 交互逻辑
        window.addEventListener('mousemove', (e) => {
            if (!group) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            gsap.to(group.rotation, { x: y * 0.4, y: x * 0.4, duration: 2 });
        });

        window.addEventListener('touchmove', (e) => {
            if (!group) return;
            const touch = e.touches[0];
            const x = (touch.clientX / window.innerWidth - 0.5) * 2;
            const y = (touch.clientY / window.innerHeight - 0.5) * 2;
            gsap.to(group.rotation, { x: y * 0.3, y: x * 0.3, duration: 1.5 });
        });

        // 确保资源加载完成后再启动
        window.onload = init;
    </script>
</body>
</html>
