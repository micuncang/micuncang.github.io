<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dryrun.cc — Co-Evolution.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #030610; /* 深藏青色背景 */
            --wireframe-color: rgba(71, 85, 105, 0.4); /* 极淡的冷灰蓝线条 */
            --stream-color: #00D4FF; /* 大胆轻快的青绿色流光 */
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-tertiary: rgba(148, 163, 184, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Geist Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            overflow: hidden; /* 保持整洁 */
        }

        /* 移动端间距调整 */
        @media (max-width: 768px) {
            body { padding: 30px; }
        }

        /* --- 核心视觉：保留原有 3D 参数化流光网格 (秩序与涌现) --- */
        .order-emerge-visual {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            perspective: 1000px;
            z-index: 1;
        }

        /* 移动端缩小视觉尺寸 */
        @media (max-width: 768px) {
            .order-emerge-visual {
                width: 300px;
                height: 300px;
            }
        }

        .mesh {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: mesh-rotate 30s linear infinite; /* 极其缓慢的旋转 */
            opacity: 0.8; /* 默认半透明 */
        }

        /* 生成球体的经纬线 (代表秩序) */
        .ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid var(--wireframe-color);
            border-radius: 50%;
            backface-visibility: hidden;
            animation: line-breathe 10s ease-in-out infinite; /* 舒缓呼吸感 */
        }

        /* CSS 变量控制旋转角度和动画延迟，模拟立体感 */
        .ring:nth-child(1)  { transform: rotateY(0deg); animation-delay: 0s; }
        .ring:nth-child(2)  { transform: rotateY(22.5deg); animation-delay: 0.5s; }
        .ring:nth-child(3)  { transform: rotateY(45deg); animation-delay: 1.0s; }
        .ring:nth-child(4)  { transform: rotateY(67.5deg); animation-delay: 1.5s; }
        .ring:nth-child(5)  { transform: rotateY(90deg); animation-delay: 2.0s; }
        .ring:nth-child(6)  { transform: rotateY(112.5deg); animation-delay: 2.5s; }
        .ring:nth-child(7)  { transform: rotateY(135deg); animation-delay: 3.0s; }
        .ring:nth-child(8)  { transform: rotateY(157.5deg); animation-delay: 3.5s; }
        .ring:nth-child(9)  { transform: rotateX(90deg); border-width: 2px; } /* 横向赤道线 */

        /* 涌现的流光特效 (代表智能) */
        .mesh::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--stream-color) 0%, transparent 70%);
            animation: stream-bloom 10s linear infinite;
            filter: blur(2px);
            opacity: 0.9;
            backface-visibility: hidden;
        }

        /* --- 文案与排版 (克制、代码化) --- */
        .container {
            position: relative;
            z-index: 10;
        }

        header {
            font-size: 11px;
            tracking: 0.3em;
            color: var(--text-tertiary);
            text-transform: uppercase;
        }

        main {
            margin-top: 15vh;
        }

        .hero-title {
            font-size: clamp(36px, 10vw, 72px); /* 响应式极大字体，强调恢弘感 */
            font-weight: 200; /* 极细字体，强调精密感 */
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hero-slogan {
            font-size: clamp(16px, 4vw, 24px);
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.3;
            max-width: 700px;
        }

        .meta-text {
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-tertiary);
            max-width: 450px;
            line-height: 1.7;
            text-transform: lowercase;
            border-left: 1px solid var(--wireframe-color);
            padding-left: 20px;
        }

        /* --- 落款与致谢 --- */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .footer-left p {
            margin-bottom: 4px;
        }

        .typing::after {
            content: '_';
            animation: cursor-blink 1.2s step-end infinite;
        }

        .design-credit {
            writing-mode: vertical-rl;
            letter-spacing: 0.2em;
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* --- Animations (保留全套原有逻辑) --- */
        
        @keyframes mesh-rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        @keyframes line-breathe {
            0%, 100% { border-color: rgba(71, 85, 105, 0.4); opacity: 0.8; }
            50% { border-color: rgba(71, 85, 105, 0.7); opacity: 1; }
        }

        @keyframes stream-bloom {
            0% { transform: scale(1) translate3d(0px, 150px, 0); opacity: 0.6; }
            50% { transform: scale(1.1) translate3d(0px, -150px, 0); opacity: 1; filter: blur(3px); }
            100% { transform: scale(1) translate3d(0px, 150px, 0); opacity: 0.6; }
        }

        @keyframes cursor-blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="order-emerge-visual">
        <div class="mesh">
            <div class="ring"></div>
            <div class="ring:nth-child(1)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(2)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(3)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(4)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(5)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(6)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(7)"></div>
            <div class="ring"></div>
            <div class="ring:nth-child(8)"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
    </div>

    <div class="container">
        <header>
            Init: dry run / dimensions
        </header>

        <main>
            <h1 class="hero-title">
                Co-Evolution.
            </h1>
            <p class="hero-slogan">
                Rational intelligence, shaped by thoughts.
                <span style="font-size: 0.8em; color: rgba(148, 163, 184, 0.6); display: block; margin-top: 6px;">
                    理性智能，思想铸就。
                </span>
            </p>
            <p class="meta-text">
                // > "Computers are useless. They can only give you answers." — Picasso<br>
                // > 电脑没啥用，它们只会给答案。（提问才是人的特权）
            </p>
        </main>
    </div>

    <footer>
        <div class="footer-left">
            <p>> Status: Phase One / Evolving [One commit at a time.<span class="typing"></span>]</p>
        </div>
        <div class="design-credit">
            Designed by Gemini
        </div>
    </footer>

</body>
</html>
