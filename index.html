<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>···</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&family=JetBrains+Mono:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c10;
  --s1:      #13131a;
  --s2:      #1a1a24;
  --ol:      rgba(255,255,255,0.07);
  --ol2:     rgba(255,255,255,0.12);
  --t1:      #eceef6;
  --t2:      #8890a8;
  --t3:      #44485a;
  --blue:    #8ab4f8;
  --teal:    #78d9c5;
  --pink:    #f48fb1;
  --yellow:  #fdd663;
  --sans:    'Google Sans', system-ui, sans-serif;
  --display: 'Google Sans Display', 'Google Sans', sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --r-xl:    32px;
  --r-l:     24px;
  --r-m:     16px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
}

/* ── ambient light ── */
.amb {
  position: fixed; border-radius: 50%;
  filter: blur(100px); pointer-events: none; z-index: 0;
}
.amb-1 { width: 600px; height: 600px; background: #1a3a8a; opacity: 0.22;
  top: -200px; left: -150px; animation: f1 14s ease-in-out infinite alternate; }
.amb-2 { width: 400px; height: 400px; background: #1a6a4a; opacity: 0.16;
  bottom: -120px; right: -80px; animation: f2 11s ease-in-out infinite alternate; }

@keyframes f1 { to { transform: translate(40px, 30px) scale(1.1); } }
@keyframes f2 { to { transform: translate(-30px, -20px) scale(1.08); } }

/* ── stage ── */
.stage {
  position: relative; z-index: 1;
  width: min(720px, 92vw);
  display: grid;
  grid-template-rows: 1fr auto;
  gap: 10px;
  height: min(560px, 88dvh);
}

/* ── quote card ── */
.q-card {
  background: var(--s1);
  border: 1px solid var(--ol);
  border-radius: var(--r-xl);
  padding: 36px 48px 36px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.35s;
  flex: 1;
}
.q-card:hover { border-color: var(--ol2); }

/* giant decorative quote mark — fills upper-right as bg element */
.q-card::before {
  content: '\201C';
  position: absolute;
  top: -40px; right: -10px;
  font-family: var(--display);
  font-size: clamp(200px, 28vw, 340px);
  font-weight: 700;
  line-height: 1;
  color: var(--blue);
  opacity: 0.045;
  pointer-events: none;
  user-select: none;
  letter-spacing: -0.05em;
}

/* shimmer on hover */
.q-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg,
    rgba(138,180,248,0.05) 0%,
    transparent 55%);
  opacity: 0;
  transition: opacity 0.4s;
}
.q-card:hover::after { opacity: 1; }

.q-chip {
  position: absolute;
  top: 24px; right: 24px;
  display: flex; align-items: center; gap: 6px;
  background: var(--s2);
  border: 1px solid var(--ol);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--t3);
  z-index: 1;
}
.q-chip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); opacity: 0.5;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:0.15} }

.q-body {
  position: relative; z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.q-text {
  font-family: var(--display);
  font-size: clamp(28px, 5.2vw, 58px);
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--t1);
}
.q-text em { font-style: italic; color: var(--blue); }

.q-attr {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--t3);
}


/* ── teaser card ── */
.t-card {
  background: var(--s1);
  border: 1px solid var(--ol);
  border-radius: var(--r-l);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: border-color 0.35s, transform 0.25s;
}
.t-card:hover {
  border-color: rgba(120,217,197,0.25);
  transform: translateY(-1px);
}

/* scan line */
.t-scan {
  position: absolute; left: 0; right: 0; height: 1px; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(120,217,197,0.5), transparent);
  animation: scan 5s linear infinite;
}
@keyframes scan { from { top: -1px; opacity: 1; } to { top: 100%; opacity: 0; } }

/* warm glow on teaser bg */
.t-glow {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(120deg,
    rgba(120,217,197,0.06) 0%,
    rgba(138,180,248,0.04) 50%,
    rgba(244,143,177,0.05) 100%);
}

.t-inner {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 24px 32px;
}

.t-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--teal);
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.8;
}

.t-title {
  font-family: var(--display);
  font-size: clamp(15px, 2.2vw, 20px);
  font-weight: 700;
  color: var(--t1);
  letter-spacing: -0.02em;
  margin-bottom: 5px;
  line-height: 1.25;
}

.t-desc {
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--t2);
  line-height: 1.55;
}

.t-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }

.t-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(120,217,197,0.08);
  border: 1px solid rgba(120,217,197,0.18);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--teal);
  white-space: nowrap;
}
.t-badge-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal);
  animation: blink 1.6s ease-in-out infinite;
}

.t-tags { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
.t-tag {
  background: var(--s2);
  border: 1px solid var(--ol);
  border-radius: 6px;
  padding: 3px 9px;
  font-family: var(--mono);
  font-size: 8.5px;
  letter-spacing: 0.08em;
  color: var(--t3);
}

/* ── ripple ── */
.rpl {
  position: fixed; border-radius: 50%; pointer-events: none;
  border: 1px solid rgba(138,180,248,0.3);
  transform: translate(-50%,-50%) scale(0);
  animation: rpl-out 0.55s cubic-bezier(0.2,0.8,0.4,1) forwards;
  z-index: 50;
}
@keyframes rpl-out { to { transform: translate(-50%,-50%) scale(1); opacity: 0; width: 80px; height: 80px; } }

/* ── toast ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--s2); border: 1px solid var(--ol2); border-radius: 40px;
  color: var(--t1); font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.07em; padding: 11px 22px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap; z-index: 99;
  backdrop-filter: blur(16px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── mobile ── */
@media (max-width: 560px) {
  .stage {
    width: 96vw;
    height: 96dvh;
    gap: 8px;
  }
  .q-card { padding: 28px 24px; border-radius: var(--r-l); }
  .q-card::before { font-size: clamp(160px, 48vw, 220px); top: -30px; right: -8px; }
  .q-chip { top: 16px; right: 16px; }
  .t-inner { grid-template-columns: 1fr; gap: 14px; padding: 20px 22px; }
  .t-right { align-items: flex-start; flex-direction: row; flex-wrap: wrap; }
  .t-tags  { justify-content: flex-start; }
  .t-card  { border-radius: var(--r-m); }
}
</style>
</head>
<body>

<div class="amb amb-1"></div>
<div class="amb amb-2"></div>

<div class="stage">

  <!-- quote -->
  <div class="q-card" id="q-card">
    <div class="q-chip">
      <span class="q-chip-dot"></span>
      tap to change
    </div>
    <div class="q-body">
      <div class="q-text">
        <em id="ql1"></em><br>
        <span id="ql2"></span>
      </div>
      <div class="q-attr" id="qa"></div>
    </div>
  </div>

  <!-- teaser -->
  <div class="t-card">
    <div class="t-scan"></div>
    <div class="t-glow"></div>
    <div class="t-inner">
      <div>
        <div class="t-label">coming soon</div>
        <div class="t-title">有些东西正在路上。</div>
      </div>
      <div class="t-right">
        <div class="t-badge"><span class="t-badge-dot"></span>building</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const quotes = [
  { l1: "Premature optimization",       l2: "is the root of all evil.",        a: "— Donald Knuth"     },
  { l1: "Talk is cheap.",                l2: "Show me the code.",               a: "— Linus Torvalds"   },
  { l1: "Any fool can write code",       l2: "that a computer can understand.", a: "— Martin Fowler"    },
  { l1: "Make it work, make it right,",  l2: "make it fast.",                   a: "— Kent Beck"        },
  { l1: "Simplicity is",                 l2: "the ultimate sophistication.",    a: "— Leonardo da Vinci"},
  { l1: "It works on",                   l2: "my machine.",                     a: "— Every Developer"  },
];
let qi = Math.floor(Math.random() * quotes.length);

function setQuote(i, fade) {
  const q = quotes[i];
  const els = [document.getElementById('ql1'), document.getElementById('ql2'), document.getElementById('qa')];
  if (fade) {
    els.forEach(e => { e.style.transition = 'opacity 0.25s'; e.style.opacity = 0; });
    setTimeout(() => {
      els[0].textContent = q.l1; els[1].textContent = q.l2; els[2].textContent = q.a;
      els.forEach(e => { e.style.opacity = 1; });
    }, 250);
  } else {
    els[0].textContent = q.l1; els[1].textContent = q.l2; els[2].textContent = q.a;
  }
}
setQuote(qi, false);

document.getElementById('q-card').addEventListener('click', () => {
  qi = (qi + 1) % quotes.length;
  setQuote(qi, true);
  spawnRipple(event);
});

// ripple
function spawnRipple(e) {
  const r = document.createElement('div');
  r.className = 'rpl';
  r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
  r.style.width = '10px'; r.style.height = '10px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 560);
}
document.addEventListener('click', spawnRipple);

// konami
const k = [38,38,40,40,37,39,37,39,66,65]; let ki = 0;
document.addEventListener('keydown', e => {
  ki = e.keyCode === k[ki] ? ki+1 : 0;
  if (ki === k.length) { ki = 0; toast('still compiling — and that\'s okay.'); }
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
