<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>···</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #f5f2ec;
  font-family: 'JetBrains Mono', 'Menlo', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  overflow: hidden;
  cursor: crosshair;
}

.panel {
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
  width: min(660px, 86vw);
  aspect-ratio: 660 / 400;
  border: 1px solid rgba(30,24,16,0.10);
}

@media (max-width: 540px) {
  .panel {
    width: 100vw;
    height: 100dvh;
    aspect-ratio: unset;
    border: none;
  }
}

#grid-canvas, #silk-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
#silk-canvas { pointer-events: none; }

#main-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.toast {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1e1810;
  color: #f5f2ec;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 10px 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap;
  z-index: 20;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 540px) {
  .toast {
    font-size: 10px;
    padding: 8px 14px;
    white-space: normal;
    text-align: center;
    max-width: 80vw;
    bottom: 24px;
  }
}
</style>
</head>
<body>

<div class="panel" id="panel">
  <canvas id="grid-canvas"></canvas>
  <canvas id="silk-canvas"></canvas>
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"
       style="font-family:'JetBrains Mono',monospace;"></svg>
</div>

<div class="toast" id="toast"></div>

<script>
const isMobile = () => window.innerWidth <= 540;

// ─────────────────────────────────────────
// 1. GRID — washi paper feel
// ─────────────────────────────────────────
const gridCanvas = document.getElementById('grid-canvas');
function drawGrid() {
  const W   = gridCanvas.offsetWidth  || gridCanvas.parentElement.offsetWidth;
  const H   = gridCanvas.offsetHeight || gridCanvas.parentElement.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  gridCanvas.width  = W * dpr;
  gridCanvas.height = H * dpr;
  const c = gridCanvas.getContext('2d');
  c.scale(dpr, dpr);

  // warm off-white base
  c.fillStyle = '#f5f2ec';
  c.fillRect(0, 0, W, H);

  // very faint grid — like graph paper
  const step = isMobile() ? 40 : 55;
  c.strokeStyle = 'rgba(30,24,16,0.07)';
  c.lineWidth = 0.6;
  for (let x = 0; x <= W; x += step) {
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke();
  }
  for (let y = 0; y <= H; y += step) {
    c.beginPath(); c.moveTo(0, y); c.lineTo(W, y); c.stroke();
  }

  // single accent line — top edge, thin vermilion
  c.strokeStyle = 'rgba(180,60,30,0.35)';
  c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(0, 0); c.lineTo(W, 0); c.stroke();
}
setTimeout(drawGrid, 0);
window.addEventListener('resize', drawGrid);

// ─────────────────────────────────────────
// 2. BUILD SVG
// ─────────────────────────────────────────
const svg = document.getElementById('main-svg');
const NS  = 'http://www.w3.org/2000/svg';

function mkText(attrs, text) {
  const el = document.createElementNS(NS, 'text');
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}
function mkCircle(attrs) {
  const el = document.createElementNS(NS, 'circle');
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}
function mkLine(attrs) {
  const el = document.createElementNS(NS, 'line');
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

function buildSVG() {
  svg.innerHTML = '';
  const mobile = isMobile();

  let VW, VH;
  if (mobile) {
    VW = 330;
    VH = Math.round(330 * window.innerHeight / window.innerWidth);
  } else {
    VW = 660; VH = 400;
  }
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  const cx = VW / 2;

  const qSize  = mobile ? 12  : 11.5;
  const aSize  = mobile ? 9.5 : 9;
  const lSize  = mobile ? 13  : 14;

  const openY  = mobile ? VH * 0.10 : 58;
  const q1Y    = mobile ? VH * 0.20 : 96;
  const q2Y    = mobile ? VH * 0.27 : 114;
  const qaY    = mobile ? VH * 0.34 : 136;
  // thin separator line
  const sepY   = mobile ? VH * 0.42 : 158;
  const l1Y    = mobile ? VH * 0.52 : 202;
  const l2Y    = mobile ? VH * 0.61 : 232;
  const l2bY   = mobile ? VH * 0.68 : 0;
  const fineY  = mobile ? VH * 0.77 : 262;
  const dotY   = mobile ? VH * 0.90 : 338;
  const dotR   = mobile ? 3.5       : 3;

  // ink-wash opening mark
  svg.appendChild(mkText({
    x: cx, y: openY,
    'font-size': mobile ? 32 : 28,
    'font-weight': 300,
    fill: '#1e1810', opacity: 0.12,
    'text-anchor': 'middle'
  }, '\u201C'));

  // quote
  const q1 = mkText({
    id: 'q1', x: cx, y: q1Y,
    'font-size': qSize, 'font-style': 'italic',
    fill: '#3a3228', 'text-anchor': 'middle', 'letter-spacing': '0.05em'
  });
  const q2 = mkText({
    id: 'q2', x: cx, y: q2Y,
    'font-size': qSize, 'font-style': 'italic',
    fill: '#3a3228', 'text-anchor': 'middle', 'letter-spacing': '0.05em'
  });
  const qa = mkText({
    id: 'qa', x: cx, y: qaY,
    'font-size': aSize,
    fill: '#a09080', 'text-anchor': 'middle', 'letter-spacing': '0.16em'
  });
  svg.appendChild(q1); svg.appendChild(q2); svg.appendChild(qa);

  // thin hairline separator
  svg.appendChild(mkLine({
    x1: cx - 32, y1: sepY, x2: cx + 32, y2: sepY,
    stroke: 'rgba(30,24,16,0.15)', 'stroke-width': 0.5
  }));

  // three lines — ink gradient: dark → mid → ghost
  svg.appendChild(mkText({
    x: cx, y: l1Y, 'font-size': lSize,
    fill: '#2a221a', 'text-anchor': 'middle', 'letter-spacing': '0.03em'
  }, 'something is compiling.'));

  if (mobile) {
    const l2el = document.createElementNS(NS, 'text');
    l2el.setAttribute('font-size', lSize);
    l2el.setAttribute('fill', '#7a6e62');
    l2el.setAttribute('text-anchor', 'middle');
    l2el.setAttribute('letter-spacing', '0.03em');
    const ts1 = document.createElementNS(NS, 'tspan');
    ts1.setAttribute('x', cx); ts1.setAttribute('y', l2Y);
    ts1.textContent = 'it has been compiling';
    const ts2 = document.createElementNS(NS, 'tspan');
    ts2.setAttribute('x', cx); ts2.setAttribute('y', l2bY);
    ts2.textContent = 'for a while.';
    l2el.appendChild(ts1); l2el.appendChild(ts2);
    svg.appendChild(l2el);
  } else {
    svg.appendChild(mkText({
      x: cx, y: l2Y, 'font-size': lSize,
      fill: '#7a6e62', 'text-anchor': 'middle', 'letter-spacing': '0.03em'
    }, 'it has been compiling for a while.'));
  }

  const fineEl = mkText({
    id: 'fine-text', x: cx, y: fineY, 'font-size': lSize,
    fill: '#c4b8a8', 'text-anchor': 'middle', 'letter-spacing': '0.03em'
  }, 'this is fine.');
  fineEl.style.cursor = 'pointer';
  svg.appendChild(fineEl);

  // dot — vermilion accent
  svg.appendChild(mkCircle({
    id: 'pulse-dot', cx: cx, cy: dotY, r: dotR, fill: '#b43c1e'
  }));

  bindFine();
}

buildSVG();
window.addEventListener('resize', () => {
  buildSVG(); drawGrid(); initSilk();
});

// ─────────────────────────────────────────
// 3. DOT pulse — slow, warm
// ─────────────────────────────────────────
// vermilion → dusty rose → warm gold
const colorStops = [[180,60,30],[200,130,90],[190,150,60]];
let dotT0 = null;
const DOT_PERIOD = 6000;
function lerpColor(a, b, t) {
  return a.map((v,i) => Math.round(v + (b[i]-v) * t));
}
function animateDot(ts) {
  if (!dotT0) dotT0 = ts;
  const phase   = ((ts - dotT0) % DOT_PERIOD) / DOT_PERIOD;
  const opacity = 0.2 + 0.8 * (0.5 + 0.5 * Math.cos(phase * 2 * Math.PI));
  const seg = colorStops.length;
  const pos = (phase * seg) % seg;
  const idx = Math.floor(pos) % seg;
  const [r,g,b] = lerpColor(colorStops[idx], colorStops[(idx+1)%seg], pos - Math.floor(pos));
  const dot = document.getElementById('pulse-dot');
  if (dot) {
    dot.setAttribute('fill', `rgb(${r},${g},${b})`);
    dot.setAttribute('opacity', opacity.toFixed(3));
  }
  requestAnimationFrame(animateDot);
}
requestAnimationFrame(animateDot);

// ─────────────────────────────────────────
// 4. SILK ripple
// ─────────────────────────────────────────
const silkCanvas = document.getElementById('silk-canvas');
const panel      = document.getElementById('panel');
let sW, sH, sCols, sRows, pts;

function initSilk() {
  sW    = panel.offsetWidth;
  sH    = panel.offsetHeight;
  sCols = 36;
  sRows = Math.round(sCols * sH / sW);
  const dpr = window.devicePixelRatio || 1;
  silkCanvas.width  = sW * dpr;
  silkCanvas.height = sH * dpr;
  const ctx = silkCanvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
  pts = [];
  for (let r = 0; r <= sRows; r++) {
    for (let c = 0; c <= sCols; c++) {
      const ox = (c / sCols) * sW;
      const oy = (r / sRows) * sH;
      pts.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });
    }
  }
}
setTimeout(initSilk, 0);

const waves  = [];
const SPRING = 0.10, DAMPING = 0.82, W_SPEED = 0.014, W_FORCE = 2.2;

function addWave(px, py) {
  const rect = panel.getBoundingClientRect();
  waves.push({ x: px - rect.left, y: py - rect.top, t: 0 });
}

function tickSilk() {
  if (!pts) return;
  const maxD = Math.max(sW, sH);
  waves.forEach(w => {
    w.t += W_SPEED;
    pts.forEach(p => {
      const dx = p.ox - w.x, dy = p.oy - w.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const wavefront = w.t * maxD * 0.55;
      const spread    = maxD * 0.10;
      const envelope  = Math.exp(-((dist-wavefront)**2)/(2*spread**2));
      if (envelope > 0.001) {
        const angle = Math.atan2(dy, dx);
        const force = envelope * W_FORCE;
        p.vx += Math.cos(angle) * force * 0.10;
        p.vy += Math.sin(angle) * force * 0.10;
        p.vy += Math.sin(dist*0.04 - w.t*16) * envelope * force * 0.4;
      }
    });
  });
  for (let i = waves.length-1; i >= 0; i--) {
    if (waves[i].t > 2.4) waves.splice(i, 1);
  }
  pts.forEach(p => {
    const fx = (p.ox-p.x)*SPRING, fy = (p.oy-p.y)*SPRING;
    p.vx = (p.vx+fx)*DAMPING; p.vy = (p.vy+fy)*DAMPING;
    p.x += p.vx; p.y += p.vy;
  });
}

function drawSilk() {
  if (!pts || !sW) return;
  const ctx = silkCanvas.getContext('2d');
  ctx.clearRect(0, 0, sW, sH);
  for (let r = 0; r <= sRows; r++) {
    ctx.beginPath();
    for (let c = 0; c <= sCols; c++) {
      const p    = pts[r*(sCols+1)+c];
      const disp = Math.sqrt((p.x-p.ox)**2+(p.y-p.oy)**2);
      // warm ink tone for silk threads
      ctx.strokeStyle = `rgba(30,20,10,${Math.min(0.12, 0.005+disp*0.013).toFixed(3)})`;
      ctx.lineWidth = 0.5;
      c === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }
  for (let c = 0; c <= sCols; c++) {
    ctx.beginPath();
    for (let r = 0; r <= sRows; r++) {
      const p    = pts[r*(sCols+1)+c];
      const disp = Math.sqrt((p.x-p.ox)**2+(p.y-p.oy)**2);
      ctx.strokeStyle = `rgba(30,20,10,${Math.min(0.09, 0.005+disp*0.010).toFixed(3)})`;
      ctx.lineWidth = 0.5;
      r === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }
}

function loopSilk() { tickSilk(); drawSilk(); requestAnimationFrame(loopSilk); }
requestAnimationFrame(loopSilk);

panel.addEventListener('click', e => addWave(e.clientX, e.clientY));
panel.addEventListener('touchstart', e => {
  const t = e.touches[0];
  addWave(t.clientX, t.clientY);
}, { passive: true });

// ─────────────────────────────────────────
// 5. QUOTES
// ─────────────────────────────────────────
const quotes = [
  { l1: "Premature optimization",       l2: "is the root of all evil.",        a: "— Donald Knuth"     },
  { l1: "Talk is cheap.",                l2: "Show me the code.",               a: "— Linus Torvalds"   },
  { l1: "Any fool can write code",       l2: "that a computer can understand.", a: "— Martin Fowler"    },
  { l1: "Make it work, make it right,",  l2: "make it fast.",                   a: "— Kent Beck"        },
  { l1: "Simplicity is",                 l2: "the ultimate sophistication.",    a: "— Leonardo da Vinci"},
  { l1: "It works on",                   l2: "my machine.",                     a: "— Every Developer"  },
];
let qi = Math.floor(Math.random() * quotes.length);

function setQuote(i, fade) {
  const q   = quotes[i];
  const els = ['q1','q2','qa'].map(id => document.getElementById(id));
  if (!els[0]) return;
  if (fade) {
    els.forEach(el => { el.style.transition='opacity 0.5s'; el.style.opacity=0; });
    setTimeout(() => {
      els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
      els.forEach(el => { el.style.opacity=1; });
    }, 500);
  } else {
    els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
  }
}
setQuote(qi, false);

svg.addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  if ((e.clientY - rect.top) / rect.height < 0.44) {
    qi = (qi+1) % quotes.length;
    setQuote(qi, true);
  }
});

// ─────────────────────────────────────────
// 6. "this is fine." easter egg
// ─────────────────────────────────────────
const fineAlts = ["this is fine.","no, really.","i'm not okay.","help.","... fine."];
let fineCount = 0;
function bindFine() {
  const el = document.getElementById('fine-text');
  if (!el) return;
  el.style.cursor = 'pointer';
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    this.textContent = fineAlts[++fineCount % fineAlts.length];
  });
}

// ─────────────────────────────────────────
// 7. KONAMI
// ─────────────────────────────────────────
const konami = [38,38,40,40,37,39,37,39,66,65]; let ki = 0;
document.addEventListener('keydown', e => {
  ki = (e.keyCode === konami[ki]) ? ki+1 : 0;
  if (ki === konami.length) {
    ki = 0;
    showToast('still compiling.');
  }
});
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
