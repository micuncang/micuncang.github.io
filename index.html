<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>···</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: #111111;
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  cursor: crosshair;
}

.panel {
  position: relative;
  overflow: hidden;
  width: min(680px, 88vw);
  aspect-ratio: 680 / 420;
  border: 2px solid #c8d400;
}

@media (max-width: 540px) {
  .panel {
    width: 100vw;
    height: 100dvh;
    aspect-ratio: unset;
    border: none;
  }
}

#grid-canvas, #silk-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
#silk-canvas { pointer-events: none; }

#main-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

.toast {
  position: fixed;
  bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #c8d400;
  color: #111111;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.18em;
  padding: 10px 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  white-space: nowrap;
  z-index: 20;
  border: 1.5px solid #1a1a1a;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 540px) {
  .toast {
    font-size: 12px;
    padding: 8px 16px;
    white-space: normal;
    text-align: center;
    max-width: 80vw;
  }
}
</style>
</head>
<body>

<div class="panel" id="panel">
  <canvas id="grid-canvas"></canvas>
  <canvas id="silk-canvas"></canvas>
  <svg id="main-svg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div class="toast" id="toast"></div>

<script>
// ── palette ──
const C = {
  bg:    '#111111',
  ink:   '#c8d400',      // muted lime — toned down from neon
  red:   '#c8d400',
  blue:  '#0096c8',      // steel blue — less electric
  mid:   '#585858',
  faint: '#303030',
  rule:  'rgba(200,212,0,0.18)',
};

const isMobile = () => window.innerWidth <= 540;
const NS = 'http://www.w3.org/2000/svg';

function mk(tag, attrs, text) {
  const el = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

// ─────────────────────────────────────────
// QUOTES — defined before buildSVG
// ─────────────────────────────────────────
const quotes = [
  { l1: "Premature optimization",       l2: "is the root of all evil.",        a: "— Donald Knuth"     },
  { l1: "Talk is cheap.",                l2: "Show me the code.",               a: "— Linus Torvalds"   },
  { l1: "Any fool can write code",       l2: "that a computer can understand.", a: "— Martin Fowler"    },
  { l1: "Make it work, make it right,",  l2: "make it fast.",                   a: "— Kent Beck"        },
  { l1: "Simplicity is",                 l2: "the ultimate sophistication.",    a: "— Leonardo da Vinci"},
  { l1: "It works on",                   l2: "my machine.",                     a: "— Every Developer"  },
];
// pick random index ONCE on load
let qi = Math.floor(Math.random() * quotes.length);

// ─────────────────────────────────────────
// 1. GRID — halftone dot field feel
// ─────────────────────────────────────────
const gridCanvas = document.getElementById('grid-canvas');
function drawGrid() {
  const W = gridCanvas.offsetWidth  || gridCanvas.parentElement.offsetWidth;
  const H = gridCanvas.offsetHeight || gridCanvas.parentElement.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  gridCanvas.width  = W * dpr;
  gridCanvas.height = H * dpr;
  const c = gridCanvas.getContext('2d');
  c.scale(dpr, dpr);
  c.fillStyle = C.bg;
  c.fillRect(0, 0, W, H);

  // halftone dot grid — neon yellow, low opacity
  const step = isMobile() ? 22 : 28;
  for (let x = step/2; x < W; x += step) {
    for (let y = step/2; y < H; y += step) {
      c.beginPath();
      c.arc(x, y, 0.9, 0, Math.PI * 2);
      c.fillStyle = 'rgba(200,212,0,0.10)';
      c.fill();
    }
  }

  // thick top stripe — muted lime
  c.fillStyle = '#c8d400';
  c.fillRect(0, 0, W, isMobile() ? 6 : 8);

  // steel blue accent stripe below
  c.fillStyle = '#0096c8';
  c.fillRect(0, isMobile() ? 6 : 8, W, isMobile() ? 3 : 4);
}
setTimeout(drawGrid, 0);
window.addEventListener('resize', drawGrid);

// ─────────────────────────────────────────
// 2. BUILD SVG
// ─────────────────────────────────────────
const svg = document.getElementById('main-svg');

function buildSVG() {
  svg.innerHTML = '';
  const mobile = isMobile();

  let VW, VH;
  if (mobile) {
    VW = 330;
    VH = Math.round(330 * window.innerHeight / window.innerWidth);
  } else {
    VW = 680; VH = 420;
  }
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  const cx = VW / 2;

  // ── QUOTE BLOCK ──
  const openY = mobile ? VH * 0.09 : 52;
  const q1Y   = mobile ? VH * 0.18 : 88;
  const q2Y   = mobile ? VH * 0.25 : 108;
  const qaY   = mobile ? VH * 0.32 : 132;

  // big italic open-quote in red
  svg.appendChild(mk('text', {
    x: cx, y: openY,
    'font-family': "'Bebas Neue', sans-serif",
    'font-size': mobile ? 36 : 44,
    fill: C.red, opacity: 0.55,
    'text-anchor': 'middle',
    'letter-spacing': '0.02em'
  }, '\u201C'));

  // quote line 1 — italic mono
  svg.appendChild(mk('text', {
    id: 'q1', x: cx, y: q1Y,
    'font-family': "'JetBrains Mono', monospace",
    'font-size': mobile ? 11.5 : 12,
    'font-style': 'italic',
    fill: C.ink, 'text-anchor': 'middle', 'letter-spacing': '0.04em'
  }));

  // quote line 2
  svg.appendChild(mk('text', {
    id: 'q2', x: cx, y: q2Y,
    'font-family': "'JetBrains Mono', monospace",
    'font-size': mobile ? 11.5 : 12,
    'font-style': 'italic',
    fill: C.ink, 'text-anchor': 'middle', 'letter-spacing': '0.04em'
  }));

  // attribution — small caps feel
  svg.appendChild(mk('text', {
    id: 'qa', x: cx, y: qaY,
    'font-family': "'JetBrains Mono', monospace",
    'font-size': mobile ? 9 : 9.5,
    fill: C.mid, 'text-anchor': 'middle', 'letter-spacing': '0.16em'
  }));

  // ── SET QUOTE TEXT IMMEDIATELY ──
  // (must happen after nodes are appended to svg)
  const q = quotes[qi];
  svg.querySelector('#q1').textContent = q.l1;
  svg.querySelector('#q2').textContent = q.l2;
  svg.querySelector('#qa').textContent = q.a;

  // ── DIVIDER — double rule varsity style ──
  const divY = mobile ? VH * 0.40 : 158;
  // thick rule
  svg.appendChild(mk('line', {
    x1: mobile ? 28 : 40, y1: divY,
    x2: mobile ? VW-28 : VW-40, y2: divY,
    stroke: C.ink, 'stroke-width': mobile ? 1.5 : 2
  }));
  // thin rule 4px below
  svg.appendChild(mk('line', {
    x1: mobile ? 28 : 40, y1: divY + (mobile ? 4 : 5),
    x2: mobile ? VW-28 : VW-40, y2: divY + (mobile ? 4 : 5),
    stroke: C.red, 'stroke-width': mobile ? 0.8 : 1
  }));

  // ── THREE LINES ──
  const l1Y  = mobile ? VH * 0.51 : 204;
  const l2Y  = mobile ? VH * 0.62 : 238;
  const l2bY = mobile ? VH * 0.70 : 0;
  const fineY = mobile ? VH * 0.79 : 272;
  const dotY  = mobile ? VH * 0.91 : 360;

  // line 1 — Bebas, bold, full ink
  svg.appendChild(mk('text', {
    x: cx, y: l1Y,
    'font-family': "'Bebas Neue', sans-serif",
    'font-size': mobile ? 22 : 28,
    fill: C.ink, 'text-anchor': 'middle', 'letter-spacing': '0.12em'
  }, 'SOMETHING IS COMPILING.'));

  // line 2 — mono mid
  if (mobile) {
    const g = document.createElementNS(NS, 'text');
    g.setAttribute('font-family', "'JetBrains Mono', monospace");
    g.setAttribute('font-size', '12');
    g.setAttribute('fill', C.mid);
    g.setAttribute('text-anchor', 'middle');
    g.setAttribute('letter-spacing', '0.03em');
    const ts1 = document.createElementNS(NS, 'tspan');
    ts1.setAttribute('x', cx); ts1.setAttribute('y', l2Y);
    ts1.textContent = 'it has been compiling';
    const ts2 = document.createElementNS(NS, 'tspan');
    ts2.setAttribute('x', cx); ts2.setAttribute('y', l2bY);
    ts2.textContent = 'for a while.';
    g.appendChild(ts1); g.appendChild(ts2);
    svg.appendChild(g);
  } else {
    svg.appendChild(mk('text', {
      x: cx, y: l2Y,
      'font-family': "'JetBrains Mono', monospace",
      'font-size': 13, fill: C.mid,
      'text-anchor': 'middle', 'letter-spacing': '0.03em'
    }, 'it has been compiling for a while.'));
  }

  // line 3 — ghost, clickable
  const fineEl = mk('text', {
    id: 'fine-text', x: cx, y: fineY,
    'font-family': "'JetBrains Mono', monospace",
    'font-size': mobile ? 11 : 12,
    fill: C.faint, 'text-anchor': 'middle', 'letter-spacing': '0.04em'
  }, 'this is fine.');
  fineEl.style.cursor = 'pointer';
  svg.appendChild(fineEl);

  // ── DOT ──
  svg.appendChild(mk('circle', {
    id: 'pulse-dot', cx: cx, cy: dotY,
    r: mobile ? 4 : 4.5, fill: C.red
  }));

  bindFine();
}

buildSVG();
window.addEventListener('resize', () => { buildSVG(); drawGrid(); initSilk(); });

// ─────────────────────────────────────────
// 3. DOT PULSE — red ↔ blue (varsity colors)
// ─────────────────────────────────────────
const colorStops = [[200,212,0],[0,150,200]];
let dotT0 = null;
const DOT_PERIOD = 5000;
function lerpColor(a,b,t){ return a.map((v,i)=>Math.round(v+(b[i]-v)*t)); }
function animateDot(ts) {
  if (!dotT0) dotT0 = ts;
  const phase = ((ts-dotT0) % DOT_PERIOD) / DOT_PERIOD;
  // ping-pong: 0→1→0
  const t = phase < 0.5 ? phase*2 : (1-phase)*2;
  const opacity = 0.3 + 0.7*(0.5+0.5*Math.cos(phase*2*Math.PI));
  const [r,g,b] = lerpColor(colorStops[0], colorStops[1], t);
  const dot = document.getElementById('pulse-dot');
  if (dot) {
    dot.setAttribute('fill', `rgb(${r},${g},${b})`);
    dot.setAttribute('opacity', opacity.toFixed(3));
  }
  requestAnimationFrame(animateDot);
}
requestAnimationFrame(animateDot);

// ─────────────────────────────────────────
// 4. SILK RIPPLE
// ─────────────────────────────────────────
const silkCanvas = document.getElementById('silk-canvas');
const panel      = document.getElementById('panel');
let sW, sH, sCols, sRows, pts;

function initSilk() {
  sW = panel.offsetWidth; sH = panel.offsetHeight;
  sCols = 36; sRows = Math.round(sCols * sH / sW);
  const dpr = window.devicePixelRatio || 1;
  silkCanvas.width = sW*dpr; silkCanvas.height = sH*dpr;
  const ctx = silkCanvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr, dpr);
  pts = [];
  for (let r = 0; r <= sRows; r++)
    for (let c = 0; c <= sCols; c++) {
      const ox = (c/sCols)*sW, oy = (r/sRows)*sH;
      pts.push({ox, oy, x:ox, y:oy, vx:0, vy:0});
    }
}
setTimeout(initSilk, 0);

const waves = [];
const SPRING=0.10, DAMPING=0.82, W_SPEED=0.014, W_FORCE=2.2;

function addWave(px, py) {
  const rect = panel.getBoundingClientRect();
  waves.push({x: px-rect.left, y: py-rect.top, t: 0});
}

function tickSilk() {
  if (!pts) return;
  const maxD = Math.max(sW, sH);
  waves.forEach(w => {
    w.t += W_SPEED;
    pts.forEach(p => {
      const dx=p.ox-w.x, dy=p.oy-w.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const env=Math.exp(-((dist-w.t*maxD*0.55)**2)/(2*(maxD*0.10)**2));
      if (env>0.001) {
        const a=Math.atan2(dy,dx), f=env*W_FORCE;
        p.vx+=Math.cos(a)*f*0.10; p.vy+=Math.sin(a)*f*0.10;
        p.vy+=Math.sin(dist*0.04-w.t*16)*env*f*0.4;
      }
    });
  });
  for (let i=waves.length-1;i>=0;i--) if (waves[i].t>2.4) waves.splice(i,1);
  pts.forEach(p=>{
    const fx=(p.ox-p.x)*SPRING, fy=(p.oy-p.y)*SPRING;
    p.vx=(p.vx+fx)*DAMPING; p.vy=(p.vy+fy)*DAMPING;
    p.x+=p.vx; p.y+=p.vy;
  });
}

function drawSilk() {
  if (!pts||!sW) return;
  const ctx=silkCanvas.getContext('2d');
  ctx.clearRect(0,0,sW,sH);
  for (let r=0;r<=sRows;r++) {
    ctx.beginPath();
    for (let c=0;c<=sCols;c++) {
      const p=pts[r*(sCols+1)+c];
      const d=Math.sqrt((p.x-p.ox)**2+(p.y-p.oy)**2);
      ctx.strokeStyle=`rgba(200,212,0,${Math.min(0.12,0.003+d*0.011).toFixed(3)})`;
      ctx.lineWidth=0.5;
      c===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }
  for (let c=0;c<=sCols;c++) {
    ctx.beginPath();
    for (let r=0;r<=sRows;r++) {
      const p=pts[r*(sCols+1)+c];
      const d=Math.sqrt((p.x-p.ox)**2+(p.y-p.oy)**2);
      ctx.strokeStyle=`rgba(200,212,0,${Math.min(0.09,0.003+d*0.009).toFixed(3)})`;
      ctx.lineWidth=0.5;
      r===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
    }
    ctx.stroke();
  }
}

function loopSilk(){tickSilk();drawSilk();requestAnimationFrame(loopSilk);}
requestAnimationFrame(loopSilk);

panel.addEventListener('click', e=>addWave(e.clientX,e.clientY));
panel.addEventListener('touchstart', e=>{
  addWave(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

// ─────────────────────────────────────────
// 5. QUOTE CYCLE — click top 44% of panel
// ─────────────────────────────────────────
function setQuote(i, fade) {
  const q = quotes[i];
  const els = ['q1','q2','qa'].map(id=>svg.querySelector('#'+id));
  if (!els[0]) return;
  if (fade) {
    els.forEach(el=>{el.style.transition='opacity 0.4s';el.style.opacity=0;});
    setTimeout(()=>{
      els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
      els.forEach(el=>{el.style.opacity=1;});
    },400);
  } else {
    els[0].textContent=q.l1; els[1].textContent=q.l2; els[2].textContent=q.a;
  }
}

svg.addEventListener('click', function(e){
  const rect=this.getBoundingClientRect();
  if ((e.clientY-rect.top)/rect.height < 0.44) {
    qi=(qi+1)%quotes.length;
    setQuote(qi,true);
  }
});

// ─────────────────────────────────────────
// 6. EASTER EGG — "this is fine."
// ─────────────────────────────────────────
const fineAlts=["this is fine.","no, really.","i'm not okay.","help.","... fine."];
let fineCount=0;
function bindFine(){
  const el=svg.querySelector('#fine-text');
  if (!el) return;
  el.style.cursor='pointer';
  el.addEventListener('click',function(e){
    e.stopPropagation();
    this.textContent=fineAlts[++fineCount%fineAlts.length];
  });
}

// ─────────────────────────────────────────
// 7. KONAMI
// ─────────────────────────────────────────
const konami=[38,38,40,40,37,39,37,39,66,65]; let ki=0;
document.addEventListener('keydown',e=>{
  ki=(e.keyCode===konami[ki])?ki+1:0;
  if(ki===konami.length){
    ki=0; showToast('STILL COMPILING.');
  }
});
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
